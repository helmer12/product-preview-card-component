<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet"/>

    <link rel="stylesheet" href="./style.css">
    
    <title>Frontend Mentor | Product preview card component</title>
  </head>

  <body>
    <main>
      <article class="product-card">
        <div class="card-image">
          <picture>
            <source
              media="(max-width: 768px)"
              srcset="./images/image-product-mobile.jpg">
            
            <img
              src="./images/image-product-desktop.jpg"
              alt="Gabrielle Essence perfume bottle">
          </picture>
        </div>
        
        <div class="product-content">
          <p class="product-category">Perfume</p>
          <h1>Gabrielle Essence Eau De Parfum</h1>
          <p class="product-description">A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>
        
          <div class="price">
            <p class="current-price">$149.99</p>
            <p class="original-price">$169.99</p>
          </div>

          <button>
            <img src="./images/icon-cart.svg" alt="">
            Add to Cart
          </button>
        </div>
      </article>
    </main>

    <footer class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
      Coded by <a href="#" rel="noopener noreferrer">Helmer Duarte Murallas</a>.
    </footer>
  </body>
</html>
